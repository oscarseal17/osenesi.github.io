<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscar Senesi</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #c1440e;
    --blue: #5b7fa6;
    --blue-light: #8aadc8;
    --cream: #f9f6f1;
    --dark: #1a1a1a;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--cream);
    cursor: none;
  }

  .cursor {
    position: fixed;
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    mix-blend-mode: multiply;
  }

  canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .center {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    text-align: center;
    opacity: 0;
    animation: fadeIn 1.4s cubic-bezier(.22,1,.36,1) 0.5s forwards;
  }

  .name-top {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: clamp(0.75rem, 1.3vw, 0.9rem);
    letter-spacing: 0.38em;
    color: var(--blue);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .name-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 13vw, 10rem);
    letter-spacing: 0.05em;
    line-height: 0.88;
    color: var(--dark);
    display: block;
  }

  .name-main span { color: var(--red); }

  .divider {
    width: 36px;
    height: 2px;
    background: var(--red);
    margin: 20px auto;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 0; height: 2px;
    background: var(--blue-light);
    opacity: 0.55;
  }
  .divider::before { left: -18px; width: 12px; }
  .divider::after  { right: -18px; width: 12px; }

  .tagline {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: clamp(0.65rem, 1.1vw, 0.78rem);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--blue);
    opacity: 0.85;
  }

  .links {
    position: fixed;
    bottom: 36px;
    left: 50%;
    z-index: 10;
    display: flex;
    gap: 44px;
    align-items: center;
    opacity: 0;
    animation: fadeInLinks 1.2s cubic-bezier(.22,1,.36,1) 1s forwards;
  }

  .links a {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dark);
    text-decoration: none;
    position: relative;
    padding-bottom: 4px;
    transition: color 0.3s;
  }
  .links a::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 1.5px;
    background: var(--red);
    transition: width 0.35s cubic-bezier(.22,1,.36,1);
  }
  .links a:hover { color: var(--red); }
  .links a:hover::after { width: 100%; }

  .sep { width: 3px; height: 3px; border-radius: 50%; background: var(--blue-light); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, calc(-50% + 18px)); }
    to   { opacity: 1; transform: translate(-50%, -50%); }
  }
  @keyframes fadeInLinks {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<canvas id="c"></canvas>

<div class="center">
  <p class="name-top">Data Engineer · 800m Athlete</p>
  <h1 class="name-main">Tu <span>Nombre</span></h1>
  <div class="divider"></div>
  <p class="tagline">Sports & Health Tech &nbsp;·&nbsp; Startups</p>
</div>

<div class="links">
  <a href="https://github.com/oscarseal17" target="_blank">GitHub</a>
  <div class="sep"></div>
  <a href="https://linkedin.com/in/oscarsenesi" target="_blank">LinkedIn</a>
</div>

<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

const LANE_COLOR = '#c1440e';

let cx, cy, innerR, laneW, angleStart, angleEnd;
const lanes = 6;
let runners = [];

// numAngle corresponds to progress=0, angleEnd corresponds to progress=1
// progress goes from 0 (numbers position) to 1 (finish line)
const NUM_ANGLE_OFFSET = 0.15; // matches lane number placement

function initRunners() {
  runners = [];
  for (let i = 0; i < lanes; i++) {
    runners.push({
      lane: i,
      progress: Math.random(),
      speed: 0.0022 + Math.random() * 0.001 - i * 0.00008,
    });
  }
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W * -0.04;
  cy = H * 1.06;
  innerR = Math.min(W, H) * 0.22;
  laneW  = Math.min(W, H) * 0.042;
  angleStart = -Math.PI * 0.02;
  angleEnd   = -Math.PI * 0.52;
  initRunners();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Lane fills
  for (let i = 0; i < lanes; i++) {
    const r1 = innerR + i * laneW;
    const r2 = r1 + laneW;
    ctx.beginPath();
    ctx.arc(cx, cy, r2, angleEnd, angleStart);
    ctx.arc(cx, cy, r1, angleStart, angleEnd, true);
    ctx.closePath();
    ctx.fillStyle = LANE_COLOR;
    ctx.globalAlpha = 1;
    ctx.fill();
  }

  // White lane lines
  for (let i = 0; i <= lanes; i++) {
    const r = innerR + i * laneW;
    ctx.beginPath();
    ctx.arc(cx, cy, r, angleEnd, angleStart);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = (i === 0 || i === lanes) ? 2.5 : 1.4;
    ctx.globalAlpha = (i === 0 || i === lanes) ? 0.8 : 0.5;
    ctx.stroke();
  }

  // FINISH LINE — thick white line across all lanes at angleEnd
  {
    const r1 = innerR;
    const r2 = innerR + lanes * laneW;
    const fx1 = cx + r1 * Math.cos(angleEnd);
    const fy1 = cy + r1 * Math.sin(angleEnd);
    const fx2 = cx + r2 * Math.cos(angleEnd);
    const fy2 = cy + r2 * Math.sin(angleEnd);

    // Bold white finish line
    ctx.beginPath();
    ctx.moveTo(fx1, fy1);
    ctx.lineTo(fx2, fy2);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 4;
    ctx.globalAlpha = 1;
    ctx.stroke();

    // Red accent line just before finish
    const offset = 6;
    const ox = Math.cos(angleEnd + Math.PI/2) * offset;
    const oy = Math.sin(angleEnd + Math.PI/2) * offset;
    ctx.beginPath();
    ctx.moveTo(fx1 + ox, fy1 + oy);
    ctx.lineTo(fx2 + ox, fy2 + oy);
    ctx.strokeStyle = '#c1440e';
    ctx.lineWidth = 2.5;
    ctx.globalAlpha = 1;
    ctx.stroke();

    // FINISH label — outside the outermost lane, clearly visible
    const perpAngle = angleEnd - Math.PI / 2;
    const labelR = r2 + laneW * 0.9;
    const labelX = cx + labelR * Math.cos(angleEnd);
    const labelY = cy + labelR * Math.sin(angleEnd);
    ctx.save();
    ctx.translate(labelX, labelY);
    ctx.rotate(angleEnd + Math.PI / 2);
    ctx.font = `bold ${Math.max(11, laneW * 0.42)}px "DM Sans", sans-serif`;
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 1;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('FINISH', 0, 0);
    ctx.restore();
  }

  // Lane numbers — clean, just the number, mid-arc
  {
    const numAngle = angleStart + (angleEnd - angleStart) * 0.15;
    const fontSize = Math.max(14, laneW * 0.58);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `bold ${fontSize}px "DM Sans", sans-serif`;
    for (let i = 0; i < lanes; i++) {
      const r = innerR + i * laneW + laneW * 0.5;
      const nx = cx + r * Math.cos(numAngle);
      const ny = cy + r * Math.sin(numAngle);
      // Subtle dark shadow for readability
      ctx.fillStyle = '#1a1a1a';
      ctx.globalAlpha = 0.4;
      ctx.fillText(i + 1, nx + 1, ny + 1);
      // White number
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 1;
      ctx.fillText(i + 1, nx, ny);
    }
  }

  // Dots (runners) with trail — from number position to finish line
  for (const runner of runners) {
    runner.progress += runner.speed;
    if (runner.progress >= 1) runner.progress = 0; // loop

    // startAngle = where numbers are, endAngle = finish line (angleEnd)
    const startA = angleStart + (angleEnd - angleStart) * NUM_ANGLE_OFFSET;
    const angle = startA + runner.progress * (angleEnd - startA);
    const r = innerR + runner.lane * laneW + laneW * 0.5;
    const rx = cx + r * Math.cos(angle);
    const ry = cy + r * Math.sin(angle);

    const dotR = Math.max(3.5, laneW * 0.22);

    // Trail — small fading dots behind
    const trailSteps = 6;
    const startAT = angleStart + (angleEnd - angleStart) * NUM_ANGLE_OFFSET;
    for (let t = 1; t <= trailSteps; t++) {
      const tp = runner.progress - t * 0.018;
      if (tp < 0) continue;
      const ta = startAT + tp * (angleEnd - startAT);
      const tx = cx + r * Math.cos(ta);
      const ty = cy + r * Math.sin(ta);
      ctx.beginPath();
      ctx.arc(tx, ty, dotR * (1 - t / trailSteps) * 0.7, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.25 * (1 - t / trailSteps);
      ctx.fill();
    }

    // Main dot
    ctx.beginPath();
    ctx.arc(rx, ry, dotR, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.95;
    ctx.fill();

    // Bright core
    ctx.beginPath();
    ctx.arc(rx, ry, dotR * 0.45, 0, Math.PI * 2);
    ctx.fillStyle = '#ffe0d0';
    ctx.globalAlpha = 1;
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  requestAnimationFrame(draw);
}

window.addEventListener('resize', () => { resize(); });
resize();
draw();
</script>
</body>
</html>
